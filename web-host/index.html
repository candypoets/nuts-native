<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Lynx Web Preview — nuts-native</title>
  <link rel="stylesheet" href="./node_modules/@lynx-js/web-core/dist/client_prod/static/css/client.css">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    #app {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    lynx-view {
      width: 100%;
      max-width: 430px;
      height: 100%;
      max-height: 932px;
      background: #131716;
    }
  </style>
</head>
<body>
  <div id="app">
    <lynx-view id="lynx-view" url="/main.web.bundle"></lynx-view>
  </div>
  <script type="module" src="./node_modules/@lynx-js/web-core/dist/client_prod/static/js/client.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const bundle = params.get('bundle') || 'main';
    document.getElementById('lynx-view').setAttribute('url', '/' + bundle + '.web.bundle');
  </script>
</body>
</html>
